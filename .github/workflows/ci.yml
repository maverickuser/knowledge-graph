name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . ruff

      - name: Run unit tests
        run: python -m unittest discover tests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . ruff

      - name: Run lint
        run: ruff check src tests

      - name: Run CLI smoke test
        run: python -m knowledge_graph.main --show-config

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init (bootstrap)
        run: terraform -chdir=terraform/bootstrap init -backend=false

      - name: Terraform validate (bootstrap)
        run: terraform -chdir=terraform/bootstrap validate

      - name: Terraform init (root)
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate (root)
        run: terraform -chdir=terraform validate

