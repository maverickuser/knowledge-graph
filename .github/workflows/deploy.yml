name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Terraform init
        run: |
          terraform -chdir=terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION || 'ap-south-1' }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        run: terraform -chdir=terraform plan -input=false -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Terraform init
        run: |
          terraform -chdir=terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION || 'ap-south-1' }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform

      - name: Terraform apply
        run: terraform -chdir=terraform apply -input=false -auto-approve tfplan

      - name: Read Terraform outputs
        id: terraform-output
        run: |
          echo "dynamodb_table_name=$(terraform -chdir=terraform output -raw dynamodb_table_name)" >> "$GITHUB_OUTPUT"
          echo "snapshot_bucket_name=$(terraform -chdir=terraform output -raw snapshot_bucket_name)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Persist released graph snapshot to DynamoDB
        env:
          JEE_RAG_DYNAMODB_TABLE: ${{ steps.terraform-output.outputs.dynamodb_table_name }}
          JEE_RAG_SNAPSHOT_BUCKET: ${{ steps.terraform-output.outputs.snapshot_bucket_name }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
        run: |
          python -m knowledge_graph.main persist-snapshot \
            --snapshot-path release/physics-v4.snapshot.json \
            --backend dynamodb

