name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'knowledge-graph-terraform-state-bucket' }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'knowledge-graph/terraform.tfstate' }}
  TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE || 'knowledge-graph-terraform-lock' }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify Terraform lock table schema
        run: |
          hash_key=$(aws dynamodb describe-table \
            --table-name "$TF_STATE_DYNAMODB_TABLE" \
            --region "$AWS_REGION" \
            --query "Table.KeySchema[?KeyType=='HASH'].AttributeName | [0]" \
            --output text)
          if [ "$hash_key" != "LockID" ]; then
            echo "Terraform state lock table '$TF_STATE_DYNAMODB_TABLE' must have partition key 'LockID', found '$hash_key'."
            echo "Create or recreate the lock table with a string partition key named LockID, then rerun this workflow."
            exit 1
          fi

      - name: Terraform init
        run: |
          terraform -chdir=terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_DYNAMODB_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        run: terraform -chdir=terraform plan -input=false -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify Terraform lock table schema
        run: |
          hash_key=$(aws dynamodb describe-table \
            --table-name "$TF_STATE_DYNAMODB_TABLE" \
            --region "$AWS_REGION" \
            --query "Table.KeySchema[?KeyType=='HASH'].AttributeName | [0]" \
            --output text)
          if [ "$hash_key" != "LockID" ]; then
            echo "Terraform state lock table '$TF_STATE_DYNAMODB_TABLE' must have partition key 'LockID', found '$hash_key'."
            echo "Create or recreate the lock table with a string partition key named LockID, then rerun this workflow."
            exit 1
          fi

      - name: Terraform init
        run: |
          terraform -chdir=terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_DYNAMODB_TABLE}" \
            -backend-config="encrypt=true"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform

      - name: Terraform apply
        run: terraform -chdir=terraform apply -input=false -auto-approve tfplan

      - name: Read Terraform outputs
        id: terraform-output
        run: |
          echo "dynamodb_table_name=$(terraform -chdir=terraform output -raw dynamodb_table_name)" >> "$GITHUB_OUTPUT"
          echo "snapshot_bucket_name=$(terraform -chdir=terraform output -raw snapshot_bucket_name)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Persist released graph snapshot to DynamoDB
        env:
          JEE_RAG_DYNAMODB_TABLE: ${{ steps.terraform-output.outputs.dynamodb_table_name }}
          JEE_RAG_SNAPSHOT_BUCKET: ${{ steps.terraform-output.outputs.snapshot_bucket_name }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          python -m knowledge_graph.main persist-snapshot \
            --snapshot-path release/physics-v4.snapshot.json \
            --backend dynamodb

